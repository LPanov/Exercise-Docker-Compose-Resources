# named volume 'sqldata' is marked as "external" (used by service 'rm'), so either remove "external" from volume definition or it needs to be created using: docker volume create sqldata

# named network 'taskboard_network' is marked as "external" (used by service 'taskboard'), so either remove "external" from network definition or it needs to be created using: docker network create -d bridge taskboard_network
name: <your project name>
services:
    taskboard:
        ports:
            - 5000:80
        container_name: web_app
        restart: on-failure
        networks:
            - taskboard_network
        image: lpanov/taskboard:0.0.2
    server:
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=yourStrongPassword12#
        ports:
            - 1433:1433
        volumes:
            - sqldata:/var/opt/mssql
        networks:
            - taskboard_network
        container_name: sqlserver
        image: mcr.microsoft.com/mssql/server
volumes:
    sqldata:
networks:
    taskboard_network: