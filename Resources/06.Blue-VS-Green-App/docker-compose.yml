services:
    vote:
        networks:
            - backend
            - frontend
        container_name: vote
        ports:
            - 5001:80
        image: vote
    result:
        networks:
            - backend
            - frontend
        container_name: result
        ports:
            - 5000:80
        image: result
    worker:
        networks:
            - backend
        container_name: worker
        image: worker
    redis:
        networks:
            - backend
        container_name: redis
        image: redis
    postgres:
        networks:
            - backend
        container_name: db
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
        volumes:
            - db:/var/lib/postgresql
        image: postgres
networks:
    frontend:
        external: true
        name: frontend
    backend:
        external: true
        name: backend
volumes:
    db:
        external: true
        name: db