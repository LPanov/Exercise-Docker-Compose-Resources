services:
  resellerapp:
    image: reseller
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/resellerdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimeZone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRINT_DATASOURCE_PASSWORD=my-secret-pw
    networks:
      - backend
  mysql:
    image: mysql:8.0 
    environment:
      - MYSQL_ROOT_PASSWORD=my-secret-pw
      - MYSQL_DATABASE=resellerdb
      - MYSQL_USER=user
      - MYSQL_PASSWORD=userpass
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysq1
networks:
  backend:
volumes:
  mysql-data: